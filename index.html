<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip 8 Emulator</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            Chip 8 emulator
        </header>

        <!-- Main Content Flex Container -->
        <main class="main-content">

            <!-- Left Column -->
            <section class="left-column">
                <select class="select-box">
                    <option>Select rom</option>
                    <option>Space Invaders</option>
                    <option>Pong</option>
                </select>

                <!-- IMPORTANT: Replace src="" with your exported image path -->
                <img src="pc.png" alt="Pixel Art Computer" class="computer-graphic">
            </section>

            <!-- Right Column (Statistics Panel) -->
            <section class="right-column">
                <div class="panel-header-bar">Statistics</div>

                <!-- Statistics Content Split -->
                <div class="stats-content-wrapper">
                    <!-- Left Side: Registers -->
                    <div class="stats-left-col">
                        <span class="black-label">Registers</span>
                        <!-- Content goes here later -->
                    </div>

                    <!-- Right Side: Stacked Items -->
                    <div class="stats-right-col">
                        <!-- Flags -->
                        <div class="flags-box">
                            <span class="black-label">Flags</span>
                            <!-- Content goes here later -->
                        </div>

                        <!-- Current Instruction -->
                        <div class="instruction-box">
                            <span class="black-label">Current Instruction</span>
                            <span class="instruction-value">0xD20110</span>
                        </div>

                        <!-- Controls -->
                        <div class="controls-section">
                            <div class="controls-header-bar">Controls</div>
                            <div class="keypad-container">
                                <!-- IMPORTANT: Replace src="" with your exported image keypad path -->
                                <img src="keyboard.png" alt="Keypad Controls" class="keypad-graphic">
                            </div>
                        </div>
                    </div>
                </div>

            </section>

        </main>
    </div>

</body>

</html>
